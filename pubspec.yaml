name: fikh_academy
description: Mëso Fikhun — Aplikacion edukativ për jurisprudencën islame
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Database
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.21
  path_provider: ^2.1.3
  path: ^1.9.0

  # Storage
  shared_preferences: ^2.2.3

  # Media
  image_picker: ^1.1.2

  # UI
  google_fonts: ^6.2.1
  lucide_icons: ^0.257.0
  shimmer: ^3.0.0
  fl_chart: ^0.68.0
  flutter_markdown: ^0.7.3

  # Network
  http: ^1.2.1

  # Home screen widget
  home_widget: ^0.7.0

  # Utils
  intl: ^0.20.2
  json_annotation: ^4.9.0
  url_launcher: ^6.2.6
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  drift_dev: ^2.18.0
  riverpod_generator: ^2.4.0
  json_serializable: ^6.8.0
  flutter_lints: ^3.0.2
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - lib/data/fiqh_content/
    - assets/icon/
